name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the sections below so we can reproduce and fix it quickly.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: When I run `bun create vex-app`, the generated project...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Exact steps to consistently reproduce the issue.
      placeholder: |
        1. Run `bun create vex-app my-app`
        2. Select options: ...
        3. Run `bun run dev`
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error output
      description: Paste any relevant error messages or stack traces.
      render: shell

  - type: input
    id: version
    attributes:
      label: create-vex-app version
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: input
    id: bun_version
    attributes:
      label: Bun version
      description: Run `bun --version`
      placeholder: "e.g. 1.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "e.g. macOS 15, Ubuntu 24.04, Windows 11"
    validations:
      required: true
